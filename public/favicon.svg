<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,255,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Top-left glow -->
  <rect width="100" height="100" rx="20" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="2"/>
  <!-- OZ letters -->
  <text
    x="50" y="63"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="900"
    font-size="44"
    fill="#f1f5f9"
    text-anchor="middle"
    letter-spacing="-2"
  >OZ</text>
  <!-- Cyan dot -->
  <circle cx="79" cy="67" r="6" fill="#00d4ff"/>
</svg>
